<!DOCTYPE html>
<!--
  Caveat on the cascade: .flip.hur.tf0 span::before (the AM/PM badge) sets its
  OWN font-size to .1em (= 60px). Its left/top/bottom em values are therefore
  relative to 60px, i.e. (originalPx / 60)em — not /600. Everything else is /600.

  Peripheral chrome that is NOT the clock face (loader, #settings config panel,
  #debug) is left in px exactly as the original — it is fixed-size UI that
  should not scale with the clock, and only appears in config/dev mode anyway.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<script>
/* Immortal: seed the screensaver config from the URL into localStorage before the clock
   initialises. tf = 0 (1-12 AM/PM) | 1 (00-23) | 2 (0-23); sc = scale 50-100. */
(function () {
  try {
    var p = new URLSearchParams(location.search);
    if (p.has('tf')) localStorage.setItem('tf', p.get('tf'));
    if (p.has('sc')) localStorage.setItem('sc', p.get('sc'));
  } catch (e) {}
})();
</script>
<meta content="en" name="content-language">
<meta content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,shrink-to-fit=no" name="viewport">
<title>Fliqlo</title>
<style>
/* ── Font ──────────────────────────────────────────────────────────────── */
@font-face{
  font-family:flip;
  src:url("Flip-Regular.otf") format("opentype");
  font-weight:700;
  font-style:normal;
}

/* ── Page / body ───────────────────────────────────────────────────────── */
/* A near-black slate backdrop (not pure black) so the dark flip cards keep a
   little contrast against the background — distinct from the cards but subtle. */
body,html{width:100%;height:100%;background-color:#0f1012}
html{touch-action:none}
body{position:relative;margin:0;padding:0;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;color:#fff;max-width:100%;max-height:100%;overflow:hidden;-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-align:center;cursor:default}
body.blur{background-color:#ff0}
body.dummy{background-color:red}
*{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none!important}
a{color:#fff;text-decoration:none}

/* ── Loader + config-panel chrome (unchanged px; not part of the clock) ── */
#loader{position:fixed;display:block;width:100%;height:100%;top:0;bottom:0;z-index:210;background-color:#000;overflow:hidden;transition:.33s ease-out}
#loader.remove{opacity:0}
#debug{z-index:10000;position:fixed;display:inline-block;height:20px;font-size:12px;line-height:20px;top:50%;left:50%;transform:translate(-50%,-50%);margin:0 auto;padding:0 5px;background-color:#0f0;color:#000}
#settings{transform-origin:bottom center;position:absolute;display:inline-block;box-sizing:border-box;left:50%;bottom:0;transform:translate(-50%,-20px);z-index:104;color:#fff;padding:4px;background-color:rgba(96,96,96,.25);border-radius:8px;font-size:13px;line-height:1;transition:opacity .2s ease-out,visibility .2s ease-out;backdrop-filter:blur(10px)}
body:not(.hover):not(.pause) #settings{opacity:0;visibility:hidden}
body.hover #settings{opacity:1;visibility:visible}
#settings dl{display:flex;justify-content:center;align-items:center;flex-wrap:nowrap;margin:0}
#settings dt{display:none}
#settings dd{position:relative;display:block;height:24px;margin:0;overflow:hidden;white-space:nowrap;text-align:left;margin:0 10px 0 0;padding:0}
#settings dd>label{display:flex;box-sizing:border-box;align-self:center;align-items:center;justify-content:center;align-items:center;height:24px;border-radius:4px;overflow:hidden;transition:background-color .15s}
.focus #settings label:not(#tf-container){pointer-events:none}
#settings dd>label:active,#settings dd>label:hover{background-color:rgba(255,255,255,.1)}
#settings dd:last-child{margin-right:0}
#tf-container{display:inline-block;position:relative;height:24px;text-align:center;box-sizing:border-box;padding:4px 6px;opacity:.8;overflow:hidden}
#tf-container::before{content:attr(data-tf);display:inline-block;color:#fff;font-size:11px;line-height:14px;width:16px;height:16px;text-align:center;border-radius:3px;box-sizing:border-box;border:solid 1px #fff;font-family:'Microsoft Sans Serif',Arial,sans-serif;pointer-events:none}
#tf-container[data-tf="12"]::before{text-indent:-2px;letter-spacing:-1px}
#settings dd input[type=checkbox]{display:none;outline:0}
#settings dd input[type=checkbox]+label{display:inline-block;box-sizing:border-box;position:relative;height:24px;text-align:center;overflow:hidden;font-size:0;padding:4px 6px;opacity:.8}
#settings dd input[type=checkbox]+label::before{content:'';display:inline-block;box-sizing:border-box;border:dashed 1px #fff;border-radius:3px;width:16px;height:16px;overflow:hidden;margin:0;background-color:transparent}
#settings dd input[type=checkbox]+label::after{content:'';position:absolute;left:0;top:0;right:0;bottom:0;margin:auto;width:18px;height:18px;border-radius:2px;overflow:hidden;background-position:center center;background-size:auto auto;background-color:transparent;background-image:repeating-linear-gradient(45deg,transparent,transparent 12px,#fff 12px,#fff 13px)}
#settings input[type=checkbox]:checked+label::before{border:solid 1px #fff;background-size:auto auto;background-color:transparent;background-image:repeating-linear-gradient(-45deg,transparent,transparent 3px,#fff 3px,#fff 4px)}
#settings input[type=checkbox]:checked+label::after{display:none}
#brightness-container,#scale-container{padding:0 6px 0 26px}
#scale-container::before{content:'';position:absolute;display:block;box-sizing:border-box;width:6px;height:6px;top:14px;left:6px;margin:0;border:solid 1px #fff;opacity:.8;border-radius:1px}
#scale-container::after{content:'';position:absolute;display:block;box-sizing:border-box;width:10px;height:10px;top:4px;left:12px;margin:0;border:solid 1px #fff;opacity:.8;border-radius:2px}
#brightness-container::before{content:'';position:absolute;display:block;width:3px;height:6px;top:8px;left:10px;margin:0;border-radius:50%;border-color:#fff;border-style:solid;border-width:1px 4px 1px 1px;box-shadow:-8px 0 0 -3px #fff,8px 0 0 -3px #fff,0 -8px 0 -3px #fff,0 8px 0 -3px #fff,-6px -6px 0 -3px #fff,-6px 6px 0 -3px #fff,6px -6px 0 -3px #fff,6px 6px 0 -3px #fff;opacity:.8}
#settings select{position:absolute;top:0;left:0;opacity:0;-webkit-appearance:none;-moz-appearance:none;appearance:none;margin:0;width:100%;height:100%;border:0;font-size:12px;outline:0}
input[type=range]{-webkit-appearance:none;appearance:none;width:62px;height:2px;box-sizing:content-box;margin:0;padding:0;background-color:rgba(255,255,255,.25);height:2px;border-radius:1px;transform:translate3d(0,0,0);backface-visibility:hidden;outline:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;box-shadow:0 1px 1px rgba(0,0,0,.15);border:0;height:12px;width:12px;border-radius:50%;background:#d7d7d7}

/* ── Stage + scale layer ───────────────────────────────────────────────── */
#main{position:absolute;display:block;width:100%;height:100%;z-index:0;transition:initial}

/* em anchor: 1em = --clock-size = the 600px digit card. Everything below is px/600. */
#main-content,.dummy.portrait:not(.innerportrait) #main-content{position:absolute;display:block;top:50%;left:50%;font-size:var(--clock-size,600px);margin-left:-1.125em;margin-top:-0.583333em;width:2.25em;height:1.166667em;text-align:center;white-space:nowrap;font-family:flip,sans-serif;font-weight:700}
.dummy #main-content,.portrait:not(.dummy) #main-content{margin-left:-0.583333em;margin-top:-1.125em;width:1.166667em;height:2.25em}

#main-content-area,.dummy.portrait:not(.innerportrait) #main-content-area{position:absolute;z-index:0;top:0;right:0;bottom:0;left:0;margin:auto;width:2.083333em;height:1em;border-radius:0.083333em}
.dummy #main-content-area,.portrait:not(.dummy) #main-content-area{width:1em;height:2.083333em}
.settings #main-content-area{transition:filter .2s linear}

/* ── Flip animation keyframes (unchanged) ──────────────────────────────── */
@keyframes fadeIn{0%{-webkit-filter:brightness(10%);filter:brightness(10%)}100%{-webkit-filter:brightness(100%);filter:brightness(100%)}}
@keyframes fadeInSCR{0%{background-color:rgba(0,0,0,.9)}100%{background-color:rgba(0,0,0,0)}}
@keyframes fadeOut1{0%,66%{-webkit-filter:brightness(100%);filter:brightness(100%)}100%{-webkit-filter:brightness(50%);filter:brightness(50%)}}
@keyframes fadeOut1SCR{0%,66%{background-color:rgba(0,0,0,0)}100%{background-color:rgba(0,0,0,.5)}}
@keyframes fadeOut2{0%{-webkit-filter:brightness(50%);filter:brightness(50%)}100%{-webkit-filter:brightness(10%);filter:brightness(10%)}}
@keyframes fadeOut2SCR{0%{background-color:rgba(0,0,0,.5)}100%{background-color:rgba(0,0,0,.9)}}
@keyframes anmTop{0%{transform:rotateX(0);-webkit-filter:brightness(100%);filter:brightness(100%)}100%{transform:rotateX(-90deg);-webkit-filter:brightness(40%);filter:brightness(40%)}}
@keyframes anmTopSCR{0%{background-color:rgba(0,0,0,0)}100%{background-color:rgba(0,0,0,.6)}}
@keyframes anmBottom{0%{transform:rotateX(90deg);-webkit-filter:brightness(200%);filter:brightness(200%)}100%{transform:rotateX(0);-webkit-filter:brightness(100%);filter:brightness(100%)}}
@keyframes anmBottomMS{0%{transform:rotateX(90deg);color:rgba(255,255,255,.9)}100%{transform:rotateX(0);color:rgba(255,255,255,.711)}}
@keyframes anmBottomSCR{0%{background-color:rgba(255,255,255,.05)}100%{background-color:rgba(255,255,255,0)}}

/* ── Digit groups (hours / minutes) ────────────────────────────────────── */
.flips{position:absolute;display:block;width:1em;height:1em;border-radius:0.083333em;transform-style:preserve-3d;perspective:6.666667em;box-shadow:0 0 0.033333em rgba(0,0,0,.5);transform:translate3d(0,0,0);backface-visibility:hidden}
.fade .flips{transition:box-shadow .2s linear}
.dark .flips{box-shadow:none}
.flips#hurs{top:0;left:0;z-index:1}
.dummy.portrait:not(.innerportrait) .flips#mins,.flips#mins{top:0;right:0;z-index:0}
.dummy .flips#mins,.portrait:not(.dummy) .flips#mins{top:auto;bottom:0}

/* ── Flip halves ───────────────────────────────────────────────────────── */
.flip{position:absolute;display:block;width:1em;height:0.495em;overflow:hidden;box-sizing:content-box;color:rgba(255,255,255,.711);z-index:0;transform:rotateX(0);-webkit-filter:brightness(100%);filter:brightness(100%);animation-duration:.165s;animation-fill-mode:forwards;transition:unset;background-color:#000}
.flip.clone{display:none}
.flip.clone.act{display:block}
.willchange .flip{will-change:animation}
.fade .flip{transition:border-color .2s linear,background-color .2s linear}
.flip.hur{left:0}
.flip.min{right:0}
.flip.clone{z-index:1;display:none}
.flip.top{border-bottom:solid 0.001667em #080808;bottom:0.505em;border-radius:0.083333em 0.083333em 0 0;animation-timing-function:ease-in}
.dark .flip.top{border-bottom-color:#000}
.flip.bottom{border-top:solid 0.001667em #151515;top:0.505em;border-radius:0 0 0.083333em 0.083333em;animation-timing-function:ease-out}
.dark .flip.bottom{border-top-color:#000}
.flip.top.clone{transform-origin:50% 0.5em}
.flip.bottom.clone{transform-origin:50% 0}
.flip.fadein{animation-name:fadeIn}
.flip.fadeout1{animation-name:fadeOut1}
.flip.fadeout2{animation-name:fadeOut2}
.flip.top.transform{display:block;animation-name:anmTop}
.flip.bottom.transform{display:block;animation-name:anmBottom}
.stop .flip.bottom.transform,.stop .flip.top.transform{animation:none}

/* card face: outer bevel (::before) + inner panel (::after) */
.flip::before{content:'';position:absolute;left:0;height:1em;width:1em;border-radius:0.083333em;background-image:linear-gradient(to bottom,#161616,#0c0c0c);z-index:0}
.flip::after{content:'';position:absolute;left:0;margin:0.001667em;height:0.996667em;width:0.996667em;border-radius:0.081667em;background-image:linear-gradient(to bottom,#111,#0b0b0b);z-index:1}
.fade .flip::after,.fade .flip::before{transition:opacity .2s linear}
.dark .flip::after,.dark .flip::before{opacity:0;backface-visibility:hidden;transform:translate3d(0,0,0)}

/* digit glyph: span is a full 1em card, clipped by the .flip half */
.flip span{position:absolute;display:block;left:0;width:1em;height:1em;overflow:hidden;text-align:center;z-index:2;font-size:1em;line-height:1.263333em}
.flip.hur.one span{text-indent:-.025em}
.flip.hur.eleven span,.flip.min.eleven span{text-indent:.08em}
.flip.hur.eleven.justeleven span,.flip.min.eleven.justeleven span{text-indent:.04em}

/* AM/PM badge: ::before sets its OWN font-size .1em(=60px), so its left/top/bottom em are px/60 */
.flip.hur.tf0 span::before{content:'AM';display:inline-block;position:absolute;font-size:0.1em;line-height:1;text-align:left;text-indent:0;left:0.633333em;top:1.3em;letter-spacing:0}
.flip.hur.tf0.pm span::before{content:'PM';top:auto;bottom:1.033333em}

.flip.top span,.flip.top::after,.flip.top::before{top:0}
.flip.bottom span,.flip.bottom::after,.flip.bottom::before{bottom:0}
</style>
