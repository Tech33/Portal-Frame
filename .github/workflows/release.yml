name: Release APK

# Build a signed release APK and attach it to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed. Requires these repository secrets:
#   FRAME_KEYSTORE_BASE64    - base64 of your release keystore (.jks)
#   FRAME_KEYSTORE_PASSWORD  - keystore password
#   FRAME_KEY_ALIAS          - key alias
#   FRAME_KEY_PASSWORD       - key password
# See RELEASING.md for how to generate the keystore and set these.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # allow manual runs (builds, but only tag pushes publish a Release)

permissions:
  contents: write          # needed to create the Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        run: echo "${{ secrets.FRAME_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          FRAME_KEYSTORE: ${{ runner.temp }}/release.jks
          FRAME_KEYSTORE_PASSWORD: ${{ secrets.FRAME_KEYSTORE_PASSWORD }}
          FRAME_KEY_ALIAS: ${{ secrets.FRAME_KEY_ALIAS }}
          FRAME_KEY_PASSWORD: ${{ secrets.FRAME_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage artifact
        id: artifact
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$APK" ]; then echo "release APK not found"; exit 1; fi
          OUT="Frame-${{ github.ref_name }}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "$OUT.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          # Stable, version-less copy so the README can link to a permanent
          # /releases/latest/download/Frame.apk URL (the redirect needs a
          # filename that's identical across every release).
          STABLE="Frame.apk"
          cp "$APK" "$STABLE"
          sha256sum "$STABLE" | tee "$STABLE.sha256"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"

      - name: Generate version.json
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -1 | sed 's/.*versionCode = //')
          VERSION_NAME=$(grep 'versionName = ' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*\)".*/\1/')
          SHA256=$(cut -d' ' -f1 "${{ steps.artifact.outputs.stable }}.sha256")
          cat > version.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "https://github.com/Tech33/Portal-Frame/releases/latest/download/Frame.apk",
            "sha256": "${SHA256}",
            "releaseNotes": "See the GitHub release notes for ${{ github.ref_name }}."
          }
          EOF
          cp version.json "$RUNNER_TEMP/version.json"
          echo "Generated version.json (versionCode=${VERSION_CODE}, sha256=${SHA256})"

      - name: Upload build artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.apk }}
          path: |
            ${{ steps.artifact.outputs.apk }}
            ${{ steps.artifact.outputs.apk }}.sha256
            version.json

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifact.outputs.apk }}
            ${{ steps.artifact.outputs.apk }}.sha256
            ${{ steps.artifact.outputs.stable }}
            ${{ steps.artifact.outputs.stable }}.sha256
            version.json
          generate_release_notes: true

      - name: Commit version.json to main (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp version.json /tmp/frame-version.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cp /tmp/frame-version.json version.json
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json for ${{ github.ref_name }}"
          git push origin main
